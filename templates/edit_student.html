<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-warning text-dark text-center">
                    <h3>Edit Student</h3>
                </div>

                <div class="card-body">

                    <form action="/update" method="POST">

                        <input type="hidden" name="student_id" value="{{ student[0] }}">

                        <div class="mb-3">
                            <label class="form-label">Roll Number</label>
                            <input type="text" name="roll_number" value="{{ student[1] }}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" value="{{ student[2] }}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select">
                                <option {% if student[3] == "Male" %}selected{% endif %}>Male</option>
                                <option {% if student[3] == "Female" %}selected{% endif %}>Female</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <input type="text" name="department" value="{{ student[4] }}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Year</label>
                            <input type="number" name="year" value="{{ student[5] }}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" value="{{ student[6] }}" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" value="{{ student[7] }}" class="form-control">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning">
                                Update Student
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
