<!DOCTYPE html>
<html>
<head>
    <title>Student Result & Analytics System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h1 class="text-center text-primary">
            🎓 Student Result & Analytics System</h1>

        <hr>

        <p class="text-center fs-4">Welcome, Santhosh 👋</p>

        <div class="row mt-4">

            <div class="col-md-4">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5>Total Students</h5>
                        <h2 class="text-primary">{{ total_students }}</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5>Total Subjects</h5>
                        <h2 class="text-success">{{ total_subjects }}</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-center shadow">
                    <div class="card-body">
                        <h5>Average Marks</h5>
                        <h2 class="text-danger">{{ average_marks }}</h2>
                    </div>
                </div>
            </div>



            <div class="text-center mt-5">
                <a href="/students" class="btn btn-primary btn-lg px-4">
                    📋 View Students
                </a>
            </div>
        </div>
    </div>
</body>
</html>
